  <rect x="60" y="408" width="160" height="48" rx="10" fill="#1c2126" stroke="#fcc934" stroke-width="1.5"/>
  <text x="140" y="428" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#fcc934">tts.py + tts/</text>
  <text x="140" y="444" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9aa0a6">generate_voice.sh</text>


  <rect x="620" y="490" width="220" height="80" rx="14" fill="url(#grad-mcp)" filter="url(#shadow)"/>
  <text x="730" y="520" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#fff">mcporter MCP</text>
  <text x="730" y="540" text-anchor="middle" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.85)">minimax-coding-plan-mcp</text>
  <text x="730" y="558" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.75)">图片理解 · 联网搜索</text>

  <!-- Arrows: scripts -> APIs -->
  <path d="M 140 456 L 140 490" stroke="#f28b82" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 332 456 L 270 490" stroke="#f28b82" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 524 456 L 480 490" stroke="#f28b82" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 716 456 L 730 490" stroke="#c58af9" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>


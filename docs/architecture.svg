  <path d="M 526 373 L 524 408" stroke="#fcc934" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 718 373 L 716 408" stroke="#fcc934" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- ===== API LAYER ===== -->
  <!-- MiniMax API -->
  <rect x="120" y="490" width="220" height="80" rx="14" fill="url(#grad-api)" filter="url(#shadow)"/>
  <text x="230" y="520" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#fff">MiniMax API</text>

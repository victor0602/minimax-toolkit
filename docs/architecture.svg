  <rect x="252" y="408" width="160" height="48" rx="10" fill="#1c2126" stroke="#fcc934" stroke-width="1.5"/>
  <text x="332" y="428" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#fcc934">image_generate.py + image/</text>
  <text x="332" y="444" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9aa0a6">generate_image.sh</text>

  <!-- music scripts -->
  <rect x="444" y="408" width="160" height="48" rx="10" fill="#1c2126" stroke="#fcc934" stroke-width="1.5"/>
  <text x="524" y="428" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#fcc934">music/generate_music.sh</text>
  <text x="524" y="444" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9aa0a6">ffmpeg 音频处理</text>

  <!-- video scripts -->
  <rect x="636" y="408" width="160" height="48" rx="10" fill="#1c2126" stroke="#fcc934" stroke-width="1.5"/>
  <text x="716" y="428" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#fcc934">video/generate_video.sh</text>
  <text x="716" y="444" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9aa0a6">ffmpeg 视频处理</text>


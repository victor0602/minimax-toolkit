<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 760" width="900" height="760">
  <defs>
    <linearGradient id="grad-cli" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#8ab4f8"/><stop offset="100%" style="stop-color:#669df6"/></linearGradient>
    <linearGradient id="grad-cmd" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#81c995"/><stop offset="100%" style="stop-color:#5d9b68"/></linearGradient>
    <linearGradient id="grad-gen" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#fcc934"/><stop offset="100%" style="stop-color:#f9ab00"/></linearGradient>
    <linearGradient id="grad-api" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#f28b82"/><stop offset="100%" style="stop-color:#e0695a"/></linearGradient>
    <linearGradient id="grad-mcp" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#c58af9"/><stop offset="100%" style="stop-color:#9b59d0"/></linearGradient>
    <linearGradient id="grad-feishu" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#34aadc"/><stop offset="100%" style="stop-color:#1a7cb5"/></linearGradient>
    <linearGradient id="grad-env" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#62727a"/><stop offset="100%" style="stop-color:#485359"/></linearGradient>
    <linearGradient id="grad-out" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#3d4a53"/><stop offset="100%" style="stop-color:#2d363d"/></linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(0,0,0,0.45)"/></filter>
    <filter id="shadow-sm" x="-10%" y="-10%" width="130%" height="130%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.35)"/></filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#5f6368"/></marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="760" fill="#0f1419"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#8ab4f8">MiniMax Toolkit — 系统架构图</text>

  <!-- ===== LAYER LABELS (left rail) ===== -->
  <rect x="18" y="60" width="5" height="55" rx="2.5" fill="#8ab4f8" opacity="0.7"/>
  <text x="30" y="82" font-family="sans-serif" font-size="10" font-weight="600" fill="#8ab4f8">用户层</text>
  <text x="30" y="96" font-family="sans-serif" font-size="9" fill="#9aa0a6">User</text>

  <rect x="18" y="135" width="5" height="55" rx="2.5" fill="#81c995" opacity="0.7"/>
  <text x="30" y="157" font-family="sans-serif" font-size="10" font-weight="600" fill="#81c995">入口层</text>
  <text x="30" y="171" font-family="sans-serif" font-size="9" fill="#9aa0a6">CLI Entry</text>

  <rect x="18" y="210" width="5" height="200" rx="2.5" fill="#fcc934" opacity="0.7"/>
  <text x="30" y="238" font-family="sans-serif" font-size="10" font-weight="600" fill="#fcc934">命令层</text>
  <text x="30" y="252" font-family="sans-serif" font-size="9" fill="#9aa0a6">Commands</text>
  <text x="30" y="266" font-family="sans-serif" font-size="9" fill="#9aa0a6">Shell Scripts</text>
  <text x="30" y="280" font-family="sans-serif" font-size="9" fill="#9aa0a6">Python Libs</text>

  <rect x="18" y="430" width="5" height="170" rx="2.5" fill="#f28b82" opacity="0.7"/>
  <text x="30" y="468" font-family="sans-serif" font-size="10" font-weight="600" fill="#f28b82">API 层</text>
  <text x="30" y="482" font-family="sans-serif" font-size="9" fill="#9aa0a6">MiniMax API</text>
  <text x="30" y="496" font-family="sans-serif" font-size="9" fill="#9aa0a6">Feishu API</text>
  <text x="30" y="510" font-family="sans-serif" font-size="9" fill="#9aa0a6">mcporter MCP</text>

  <rect x="18" y="620" width="5" height="80" rx="2.5" fill="#62727a" opacity="0.7"/>
  <text x="30" y="648" font-family="sans-serif" font-size="10" font-weight="600" fill="#62727a">配置层</text>
  <text x="30" y="662" font-family="sans-serif" font-size="9" fill="#9aa0a6">Config</text>
  <text x="30" y="676" font-family="sans-serif" font-size="9" fill="#9aa0a6">Output</text>

  <!-- ===== toolkit.py (main entry) ===== -->
  <rect x="290" y="58" width="320" height="68" rx="16" fill="url(#grad-cli)" filter="url(#shadow)"/>
  <text x="450" y="90" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="700" fill="#fff">toolkit.py</text>
  <text x="450" y="110" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="rgba(255,255,255,0.8)">Unified CLI · 统一入口</text>


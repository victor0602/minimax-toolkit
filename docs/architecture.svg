  <path d="M 115 233 L 115 260 L 142 260 L 142 315" stroke="#fcc934" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <path d="M 250 233 L 250 260 L 334 260 L 334 315" stroke="#fcc934" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <path d="M 385 233 L 385 260 L 526 260 L 526 315" stroke="#fcc934" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <path d="M 520 233 L 520 260 L 718 260 L 718 315" stroke="#fcc934" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <path d="M 655 233 L 655 260 L 400 260 L 400 315" stroke="#fcc934" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr)" opacity="0.5"/>

  <!-- ===== SCRIPT LAYER ===== -->
  <text x="450" y="398" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5f6368" letter-spacing="2">— SCRIPTS —</text>


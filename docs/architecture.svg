  <text x="142" y="340" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#2d1f00">tts</text>
  <text x="142" y="357" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6b5000">语音合成 · speech-2.8-hd</text>

  <!-- image -->
  <rect x="252" y="315" width="165" height="58" rx="12" fill="url(#grad-gen)" filter="url(#shadow-sm)"/>
  <text x="334" y="340" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#2d1f00">image</text>
  <text x="334" y="357" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6b5000">图片生成 · image-01</text>

  <!-- music -->
  <rect x="444" y="315" width="165" height="58" rx="12" fill="url(#grad-gen)" filter="url(#shadow-sm)"/>
  <text x="526" y="340" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#2d1f00">music</text>
  <text x="526" y="357" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6b5000">音乐生成 · music-2.5</text>


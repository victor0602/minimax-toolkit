  <rect x="80" y="710" width="12" height="12" rx="3" fill="#8ab4f8"/>
  <text x="98" y="721" font-family="sans-serif" font-size="10" fill="#bdc1c6">CLI 入口</text>

  <rect x="160" y="710" width="12" height="12" rx="3" fill="#81c995"/>
  <text x="178" y="721" font-family="sans-serif" font-size="10" fill="#bdc1c6">管理命令</text>

  <rect x="245" y="710" width="12" height="12" rx="3" fill="#fcc934"/>
  <text x="263" y="721" font-family="sans-serif" font-size="10" fill="#bdc1c6">生成命令</text>

  <rect x="335" y="710" width="12" height="12" rx="3" fill="#f28b82"/>
  <text x="353" y="721" font-family="sans-serif" font-size="10" fill="#bdc1c6">MiniMax API</text>

  <rect x="445" y="710" width="12" height="12" rx="3" fill="#34aadc"/>
  <text x="463" y="721" font-family="sans-serif" font-size="10" fill="#bdc1c6">Feishu API</text>

  <rect x="545" y="710" width="12" height="12" rx="3" fill="#c58af9"/>
  <text x="563" y="721" font-family="sans-serif" font-size="10" fill="#bdc1c6">mcporter MCP</text>

  <rect x="655" y="710" width="12" height="12" rx="3" fill="#62727a"/>

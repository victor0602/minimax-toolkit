  <!-- setup -->
  <rect x="60" y="178" width="110" height="55" rx="11" fill="url(#grad-cmd)" filter="url(#shadow-sm)"/>
  <text x="115" y="202" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#fff">setup</text>
  <text x="115" y="218" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">首次配置向导</text>

  <!-- check -->
  <rect x="195" y="178" width="110" height="55" rx="11" fill="url(#grad-cmd)" filter="url(#shadow-sm)"/>
  <text x="250" y="202" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#fff">check</text>
  <text x="250" y="218" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">诊断检查</text>

  <!-- doctor -->
  <rect x="330" y="178" width="110" height="55" rx="11" fill="url(#grad-cmd)" filter="url(#shadow-sm)"/>
  <text x="385" y="202" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#fff">doctor</text>
  <text x="385" y="218" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">环境修复</text>

  <!-- env -->
  <rect x="465" y="178" width="110" height="55" rx="11" fill="url(#grad-cmd)" filter="url(#shadow-sm)"/>
  <text x="520" y="202" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#fff">env</text>
  <text x="520" y="218" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">环境变量管理</text>

  <!-- feishu -->
  <rect x="600" y="178" width="110" height="55" rx="11" fill="url(#grad-cmd)" filter="url(#shadow-sm)"/>
  <text x="655" y="202" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#fff">feishu</text>
  <text x="655" y="218" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">飞书群管理</text>

  <!-- Arrows: toolkit.py -> management commands -->
  <path d="M 350 126 L 115 126 L 115 178" stroke="#81c995" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 400 126 L 250 126 L 250 178" stroke="#81c995" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 450 126 L 385 126 L 385 178" stroke="#81c995" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 500 126 L 520 126 L 520 178" stroke="#81c995" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 530 126 L 655 126 L 655 178" stroke="#81c995" stroke-width="2" fill="none" marker-end="url(#arr)"/>


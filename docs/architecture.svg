  <text x="160" y="650" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9aa0a6">MINIMAX_API_KEY · FEISHU_*</text>

  <!-- minimax-output -->
  <rect x="268" y="610" width="175" height="52" rx="10" fill="url(#grad-out)" stroke="#3d4a53" stroke-width="1.5"/>
  <text x="355" y="632" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#bdc1c6">minimax-output/</text>
  <text x="355" y="650" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9aa0a6">tts · image · music · video</text>

  <!-- mcporter.json -->
  <rect x="472" y="610" width="170" height="52" rx="10" fill="url(#grad-mcp)" opacity="0.8" filter="url(#shadow-sm)"/>
  <text x="557" y="632" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#fff">mcporter.json</text>
  <text x="557" y="650" text-anchor="middle" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.85)">MCP Server 配置</text>

  <!-- setup.sh -->
  <rect x="670" y="610" width="150" height="52" rx="10" fill="#1c2126" stroke="#81c995" stroke-width="1.5"/>
  <text x="745" y="632" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#81c995">setup.sh</text>
  <text x="745" y="650" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9aa0a6">首次引导配置</text>

  <!-- Arrows: APIs -> config/output -->
  <path d="M 230 570 L 230 590 L 355 590 L 355 610" stroke="#62727a" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <path d="M 480 570 L 480 590 L 557 590 L 557 610" stroke="#62727a" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <path d="M 655 233 L 655 260 L 745 260 L 745 610" stroke="#81c995" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr)" opacity="0.6"/>


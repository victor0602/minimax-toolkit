name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck jq curl bc

      - name: Run shellcheck
        run: |
          find . -name "*.sh" -not -path "./.git/*" | xargs shellcheck -x -S warning \
            -o SC1091=off   `# source paths not resolvable at lint time` \
            -o SC2034=off   `# variable used in sourced scripts, not tracked across files`

  test-env:
    name: Environment Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg jq curl bc

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip3 install -q requests

      - name: Run environment tests
        run: python3 scripts/test_env.py

  test-features:
    name: Feature Tests
    runs-on: ubuntu-latest
    # Feature tests hit real API — only run on main branch
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip3 install -q requests

      - name: Run feature tests
        run: python3 scripts/test_features.py
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_API_HOST: https://api.minimaxi.com

  test-shell:
    name: Shell Scripts (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: brew install shellcheck

      - name: Run shellcheck
        run: |
          find . -name "*.sh" -not -path "./.git/*" | xargs shellcheck -x -S warning \
            -o SC1091=off   `# source paths not resolvable at lint time` \
            -o SC2034=off   `# variable used in sourced scripts, not tracked across files`
